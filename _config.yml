title: Biblioteket i Rebbetuaröd
description: "Podden om klassikerna vi borde ha läst."
baseurl: "/rebbetuapodd_jekyll"

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "default"

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

paginate: 10
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      read_time: true
      author_profile: false
      share: false
      related: false
