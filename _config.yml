title: Biblioteket i Rebbetuaröd
description: "Podden om klassikerna vi borde ha läst."
locale: "sv"
date_format: "%Y-%m-%d"
url: "https://rebbetuapodd.se"

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap

paginate: 10
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      read_time: true
      author_profile: false
      share: false
      related: false
